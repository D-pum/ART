<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artisan Co</title>
</head>
<body class="bg-gray-950 text-white">

  <!-- Header -->
  <header class="fixed w-full top-0 z-50 bg-dark/95 border-b border-gray-900 backdrop-blur-sm">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <nav class="hidden md:flex gap-8 text-sm font-semibold tracking-wide uppercase">
        <a href="index.html" class="nav-link text-cyan">Home</a>
        <a href="led-systems.html" class="nav-link">LED & IoT</a>
        <a href="signage.html" class="nav-link">Signage</a>
        <a href="#quote" class="nav-link">Get a Quote</a>
      </nav>
    </div>
  </header>

  <!-- Hero Section with Background Video -->
  <section class="relative min-h-[80vh] flex items-center justify-center pt-20 border-b border-gray-900">
    <video class="hero-video absolute inset-0 w-full h-full object-cover opacity-40 z-0" autoplay loop muted playsinline>
      <source src="/aistudio/particle.mp4" type="video/mp4" />
    </video>
    
    <div class="z-10 text-center px-4 max-w-4xl mx-auto">
      <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter mb-6 uppercase">
        Deliver Impact.<br><span class="text-cyan">Translate Spaces.</span>
      </h1>
      <p class="text-xl text-gray-400 mb-10 max-w-2xl mx-auto">
        Leading architectural signage and advanced LED systems spanning regional dominance.
      </p>
      <a href="#quote" class="inline-block bg-cyan text-dark font-bold px-8 py-4 rounded uppercase tracking-widest hover:bg-white transition-colors">
        Get Started
      </a>
    </div>
  </section>

  <!-- Twin Pillars Section -->
  <section class="py-24 px-6 bg-[#0a0a0a]">
    <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-8">
      
      <!-- LED Card -->
      <a href="led-systems.html" class="group relative h-[400px] border border-gray-800 rounded-xl overflow-hidden block">
        <div class="absolute inset-0 bg-cover bg-center opacity-30 group-hover:opacity-50 transition-opacity" style="background-image: url('/aistudio/led.jpeg');"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-dark to-transparent"></div>
        <div class="absolute bottom-8 left-8 right-8">
          <h2 class="text-3xl font-bold uppercase">Active LED & IoT Systems</h2>
        </div>
      </a>

      <!-- Signage Card -->
      <a href="signage.html" class="group relative h-[400px] border border-gray-800 rounded-xl overflow-hidden block">
        <div class="absolute inset-0 bg-cover bg-center opacity-30 group-hover:opacity-50 transition-opacity" style="background-image: url('/aistudio/artisan-signage.jpeg');"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-dark to-transparent"></div>
        <div class="absolute bottom-8 left-8 right-8">
          <h2 class="text-3xl font-bold uppercase">Architectural Signage</h2>
        </div>
      </a>

    </div>
  </section>

  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
